syntax = "proto3";

package cline;

import "cline/common.proto";

option go_package = "github.com/cline/grpc-go/cline";
option java_multiple_files = true;
option java_package = "bot.cline.proto";

// 계정 관련 작업을 위한 서비스
service AccountService {
  // UI에서 사용자가 로그인 링크를 클릭했을 때의 처리를 담당합니다.
  // 상태 검증을 위한 보안 논스(nonce)를 생성하여 비밀 저장소에 저장하고,
  // 외부 브라우저에서 인증 URL을 엽니다.
  rpc accountLoginClicked(EmptyRequest) returns (String);

  // UI에서 사용자가 로그아웃 버튼을 클릭했을 때의 처리를 담당합니다.
  // API 키와 사용자 상태를 초기화합니다.
  rpc accountLogoutClicked(EmptyRequest) returns (Empty);

  // 인증 상태 업데이트 이벤트(인증 상태가 변경될 때)를 구독합니다.
  rpc subscribeToAuthStatusUpdate(EmptyRequest) returns (stream AuthState);

  // Firebase 컨텍스트의 인증 상태 변경을 처리합니다.
  // 글로벌 상태의 사용자 정보를 업데이트하고 업데이트된 값을 반환합니다.
  rpc authStateChanged(AuthStateChangedRequest) returns (AuthState);

  // 사용자의 모든 크레딧 데이터를 가져옵니다.
  // (잔액, 사용 내역, 결제 내역 등)
  rpc getUserCredits(EmptyRequest) returns (UserCreditsData);

  rpc getOrganizationCredits(GetOrganizationCreditsRequest) returns (OrganizationCreditsData);

  // 사용자의 모든 조직 데이터를 가져옵니다.
  // UserOrganization 객체의 목록을 반환합니다.
  rpc getUserOrganizations(EmptyRequest) returns (UserOrganizationsResponse);

  rpc setUserOrganization(UserOrganizationUpdateRequest) returns (Empty);

  rpc openrouterAuthClicked(EmptyRequest) returns (Empty);

  rpc requestyAuthClicked(StringRequest) returns (Empty);

  rpc hicapAuthClicked(EmptyRequest) returns (Empty);

  // 웹뷰가 사용자의 IDE로 다시 리다이렉트하는 데 사용할 수 있는 링크를 반환합니다.
  rpc getRedirectUrl(EmptyRequest) returns (String);

  // OpenAI Codex OAuth 인증
  // OAuth 흐름을 시작하고 사용자가 ChatGPT Plus/Pro로 로그인할 수 있도록 브라우저를 엽니다.
  rpc openAiCodexSignIn(EmptyRequest) returns (Empty);

  // OpenAI Codex에서 로그아웃하고 저장된 자격 증명을 초기화합니다.
  rpc openAiCodexSignOut(EmptyRequest) returns (Empty);
}

message AuthStateChangedRequest {
  Metadata metadata = 1;
  UserInfo user = 2;
}

message AuthState {
  optional UserInfo user = 1;
}

// 사용자 정보
message UserInfo {
  string uid = 1;
  optional string display_name = 2;
  optional string email = 3;
  optional string photo_url = 4;
  optional string app_base_url = 5; // Cline 앱 기본 URL
}

message UserOrganization {
  bool active = 1;
  string member_id = 2;
  string name = 3;
  string organization_id = 4;
  repeated string roles = 5; // 예: ["admin", "member", "owner"]
}

message UserOrganizationsResponse {
  repeated UserOrganization organizations = 1;
}

message UserOrganizationUpdateRequest {
  optional string organization_id = 1;
}

message UserCreditsData {
  UserCreditsBalance balance = 1;
  repeated UsageTransaction usage_transactions = 2;
  repeated PaymentTransaction payment_transactions = 3;
}

message GetOrganizationCreditsRequest {
  string organization_id = 1;
}

message OrganizationCreditsData {
  UserCreditsBalance balance = 1;
  string organization_id = 2;
  repeated OrganizationUsageTransaction usage_transactions = 3;
}

message UserCreditsBalance {
  double current_balance = 1;
}

message UsageTransaction {
  string ai_inference_provider_name = 1;
  string ai_model_name = 2;
  string ai_model_type_name = 3;
  int32 completion_tokens = 4;
  double cost_usd = 5;
  string created_at = 6;
  double credits_used = 7;
  string generation_id = 8;
  string organization_id = 9;
  int32 prompt_tokens = 10;
  int32 total_tokens = 11;
  string user_id = 12;
  string operation = 13;
}

message PaymentTransaction {
  string paid_at = 1;
  string creator_id = 2;
  int32 amount_cents = 3;
  double credits = 4;
}

message OrganizationUsageTransaction {
  string ai_inference_provider_name = 1;
  string ai_model_name = 2;
  string ai_model_type_name = 3;
  int32 completion_tokens = 4;
  double cost_usd = 5;
  string created_at = 6;
  double credits_used = 7;
  string generation_id = 8;
  string organization_id = 9;
  int32 prompt_tokens = 10;
  int32 total_tokens = 11;
  string user_id = 12;
  string operation = 13;
}
